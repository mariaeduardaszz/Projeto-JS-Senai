<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- cabeçalho -->
    <header>
        <div id="logo">
            <img src="imagens/logo.png" alt="Logo" height="70" style="border-radius: 50px; ">
        </div>

        <nav class="cabecalhoerodape">
            <a href="#">Home</a>
            <a href="#">Sobre</a>
            <a href="#">Produtos</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <!-- imagem principal -->
    <section id="foto">

        <div id="fotoPrincipal">
            <img src="imagens/fotoprincipal.png" alt="Foto principal" width="70%" style="border-radius: 10px;">
        </div>

    </section>

    <!-- serviços -->
    <section id="servico">
        <div>
            Serviços
        </div>
    </section>

    <!-- imagens e opções -->
    <section class="cards">
        <div id="fundoImagens">
            <div>
                <img src="imagens/basico.png">
                <nav class="opcoes">
                    <a href="">Básico</a>
                </nav>
            </div>

            <div>
                <img src="imagens/padrao.png">
                <nav class="opcoes">
                    <a href="">Padrão</a>
                </nav>
            </div>

            <div>
                <img src="imagens/premium.png">
                <nav class="opcoes">
                    <a href="">Premium</a>
                </nav>
            </div>
        </div>

        <!-- Escolha seu plano -->
    </section>
    <section id="escolhaPlano">
        <div>
            Escolha seu plano!
        </div>
    </section>

    <!-- formulario -->
    <section id="formulario">
        <div class="dadosFormulario">
            <label>Nome Completo:
                <input type="text" name="nome" id="nome" required>
            </label>
            <label>Nome do PET:
                <input type="text" name="nomePET" id="nomePET" required>
            </label>

            <label>Telefone:
                <input type="number" name="telefone" id="telefone" required>
            </label>

            <label>Email:
                <input type="email" name="email" id="email">
            </label>

            <label id="pagamento">Forma de paginamento:
                <input type="radio" name="formaPagamento" id="formaPagamento" required>Cartão
                <input type="radio" name="formaPagamento" id="formaPagamento" required>Boleto
                <input type="radio" name="formaPagamento" id="formaPagamento" required>Pix
            </label>

            <nav class="cadastro">
                <a href="">Cadastre-se</a>
            </nav>
        </div>

    </section>

    <!-- rodapé -->
    <footer>
        <div id="rodape">
            © 2026
        </div>
        <nav class="cabecalhoerodape">
            <a href="#">Trabalhe Conosco</a>
            <a href="#">Política de Privacidade</a>
            <a href="#">Termos de Serviço</a>
        </nav>
    </footer>
</body>

</html>
